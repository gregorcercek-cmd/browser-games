<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      color: #e94560;
      text-transform: uppercase;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      min-height: 1.8rem;
      color: #a8dadc;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #scores span { font-weight: bold; }
    #scores .x-score { color: #e94560; }
    #scores .o-score { color: #a8dadc; }

    #reset {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.05); }

    #mode-toggle {
      margin-top: 0.8rem;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc44;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #mode-toggle:hover { background: #16213e; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="scores">
  <div>X wins: <span class="x-score" id="xWins">0</span></div>
  <div>Draws: <span id="draws">0</span></div>
  <div>O wins: <span class="o-score" id="oWins">0</span></div>
</div>

<button id="reset">New Game</button>
<button id="mode-toggle">Mode: 2 Players</button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, vsAI;
  let scores = { X: 0, O: 0, D: 0 };

  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const modeBtn = document.getElementById('mode-toggle');

  vsAI = false;

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = "X's turn";
  }

  function checkWinner() {
    for (const [a, b, c] of WINS) {
      if (board[a] && board[a] === board[b] && board[b] === board[c]) {
        return { winner: board[a], line: [a, b, c] };
      }
    }
    if (board.every(v => v)) return { winner: 'Draw' };
    return null;
  }

  function applyResult(result) {
    if (result.winner === 'Draw') {
      status.textContent = "It's a draw!";
      scores.D++;
      document.getElementById('draws').textContent = scores.D;
    } else {
      status.textContent = `${result.winner} wins!`;
      result.line.forEach(i => cells[i].classList.add('win'));
      if (result.winner === 'X') { scores.X++; document.getElementById('xWins').textContent = scores.X; }
      else { scores.O++; document.getElementById('oWins').textContent = scores.O; }
    }
    gameOver = true;
  }

  function minimax(b, isMax) {
    const r = checkWinnerFor(b);
    if (r === 'O') return 10;
    if (r === 'X') return -10;
    if (b.every(v => v)) return 0;
    if (isMax) {
      let best = -Infinity;
      b.forEach((v, i) => { if (!v) { b[i] = 'O'; best = Math.max(best, minimax(b, false)); b[i] = ''; } });
      return best;
    } else {
      let best = Infinity;
      b.forEach((v, i) => { if (!v) { b[i] = 'X'; best = Math.min(best, minimax(b, true)); b[i] = ''; } });
      return best;
    }
  }

  function checkWinnerFor(b) {
    for (const [a, bb, c] of WINS) {
      if (b[a] && b[a] === b[bb] && b[bb] === b[c]) return b[a];
    }
    return null;
  }

  function aiMove() {
    let best = -Infinity, move = -1;
    board.forEach((v, i) => {
      if (!v) {
        board[i] = 'O';
        const score = minimax(board, false);
        board[i] = '';
        if (score > best) { best = score; move = i; }
      }
    });
    if (move !== -1) play(move);
  }

  function play(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    cells[i].textContent = current;
    cells[i].classList.add(current.toLowerCase(), 'taken');

    const result = checkWinner();
    if (result) { applyResult(result); return; }

    current = current === 'X' ? 'O' : 'X';
    status.textContent = `${current}'s turn${vsAI && current === 'O' ? ' (AI)' : ''}`;

    if (vsAI && current === 'O' && !gameOver) {
      setTimeout(aiMove, 300);
    }
  }

  cells.forEach(cell => cell.addEventListener('click', () => {
    if (vsAI && current === 'O') return;
    play(parseInt(cell.dataset.i));
  }));

  document.getElementById('reset').addEventListener('click', init);

  modeBtn.addEventListener('click', () => {
    vsAI = !vsAI;
    modeBtn.textContent = vsAI ? 'Mode: vs AI' : 'Mode: 2 Players';
    init();
  });

  init();
</script>
</body>
</html>
